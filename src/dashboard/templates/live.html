{% extends "base.html" %}

{% block title %}Live View - WatchDogAI{% endblock %}

{% block extra_head %}
<style>
    .live-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }

    .feed-container {
        position: relative;
        max-width: 100%;
        border: 2px solid #2a2d3a;
        border-radius: 0.5rem;
        overflow: hidden;
        background: #000;
    }

    .feed-container img {
        display: block;
        max-width: 100%;
        height: auto;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1.25rem;
        border-radius: 0.5rem;
        width: 100%;
        max-width: 720px;
    }

    .status-normal   { background: #065f46; }
    .status-violence  { background: #7f1d1d; }

    .status-bar .label { font-weight: 700; font-size: 1rem; }
    .status-bar .confidence { margin-left: auto; font-variant-numeric: tabular-nums; }
</style>
{% endblock %}

{% block content %}
<div class="live-wrapper">
    <h1 style="margin-bottom:0.5rem;">Live Camera Feed</h1>

    <div id="status-bar" class="status-bar status-normal">
        <span class="label" id="det-label">NORMAL</span>
        <span class="confidence" id="det-confidence">Violence: 0.0 %</span>
    </div>

    <div class="feed-container">
        <img src="/video_feed" alt="Live camera feed">
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function refreshStatus() {
    async function poll() {
        try {
            const resp = await fetch("/api/status");
            const data = await resp.json();
            const det = data.detection;

            const bar = document.getElementById("status-bar");
            const labelEl = document.getElementById("det-label");
            const confEl = document.getElementById("det-confidence");

            labelEl.textContent = det.label.toUpperCase();
            confEl.textContent = "Violence: " + (det.violence_score * 100).toFixed(1) + " %";

            if (det.label === "violence") {
                bar.className = "status-bar status-violence";
            } else {
                bar.className = "status-bar status-normal";
            }
        } catch (_) { /* ignore transient errors */ }
    }

    setInterval(poll, 500);
    poll();
})();
</script>
{% endblock %}
